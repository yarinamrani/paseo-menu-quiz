<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מבחן תפריט פסאו</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --olive: #5B7A5E;
    --olive-dark: #3d5340;
    --gold: #C4A265;
    --gold-light: #d4b87a;
    --cream: #F5F0E8;
    --cream-dark: #e8e0d2;
    --charcoal: #2a2a2a;
    --correct: #4a8c5c;
    --wrong: #c0392b;
    --bg: #faf8f4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--charcoal);
    min-height: 100vh;
  }

  .app {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px;
    padding-bottom: 40px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 40px 20px 30px;
    margin-bottom: 30px;
    background: linear-gradient(135deg, var(--olive) 0%, var(--olive-dark) 100%);
    border-radius: 20px;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -30%;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(196,162,101,0.15) 0%, transparent 70%);
    border-radius: 50%;
  }
  .header h1 {
    font-family: 'Rubik', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  .header .subtitle {
    font-size: 0.95rem;
    opacity: 0.85;
    font-weight: 300;
  }

  /* Progress bar */
  .progress-container {
    background: var(--cream);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .progress-bar-bg {
    flex: 1;
    height: 8px;
    background: var(--cream-dark);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--olive), var(--gold));
    border-radius: 4px;
    transition: width 0.5s ease;
  }
  .progress-text {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--olive-dark);
    white-space: nowrap;
    min-width: 60px;
    text-align: center;
  }

  /* Question card */
  .question-card {
    background: white;
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    margin-bottom: 20px;
    animation: slideIn 0.35s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .question-category {
    display: inline-block;
    background: var(--cream);
    color: var(--olive-dark);
    font-size: 0.75rem;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 14px;
    letter-spacing: 0.3px;
  }
  .question-text {
    font-family: 'Rubik', sans-serif;
    font-size: 1.15rem;
    font-weight: 600;
    line-height: 1.7;
    margin-bottom: 22px;
    color: var(--charcoal);
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 14px 18px;
    background: var(--bg);
    border: 2px solid transparent;
    border-radius: 12px;
    font-family: 'Heebo', sans-serif;
    font-size: 0.95rem;
    color: var(--charcoal);
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: right;
    line-height: 1.5;
  }
  .option-btn:hover:not(.disabled) {
    border-color: var(--gold-light);
    background: var(--cream);
  }
  .option-letter {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.8rem;
    color: var(--olive);
    transition: all 0.2s ease;
  }
  .option-btn.selected-correct {
    border-color: var(--correct);
    background: #edf7ef;
  }
  .option-btn.selected-correct .option-letter {
    background: var(--correct);
    color: white;
  }
  .option-btn.selected-wrong {
    border-color: var(--wrong);
    background: #fdf0ee;
  }
  .option-btn.selected-wrong .option-letter {
    background: var(--wrong);
    color: white;
  }
  .option-btn.show-correct {
    border-color: var(--correct);
    background: #edf7ef;
  }
  .option-btn.show-correct .option-letter {
    background: var(--correct);
    color: white;
  }
  .option-btn.disabled { cursor: default; opacity: 0.7; }
  .option-btn.disabled.selected-correct,
  .option-btn.disabled.selected-wrong,
  .option-btn.disabled.show-correct { opacity: 1; }

  /* Explanation */
  .explanation {
    margin-top: 18px;
    padding: 14px 18px;
    background: var(--cream);
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--olive-dark);
    border-right: 4px solid var(--gold);
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }

  /* Navigation */
  .nav-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    border: none;
    border-radius: 12px;
    font-family: 'Heebo', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 8px;
  }
  .nav-btn.primary {
    background: var(--olive);
    color: white;
  }
  .nav-btn.primary:hover { background: var(--olive-dark); }
  .nav-btn.secondary {
    background: var(--cream);
    color: var(--olive-dark);
  }
  .nav-btn.secondary:hover { background: var(--cream-dark); }
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
  }

  /* Results */
  .results-card {
    background: white;
    border-radius: 20px;
    padding: 36px 28px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    text-align: center;
    animation: slideIn 0.4s ease;
  }
  .score-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    margin: 0 auto 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Rubik', sans-serif;
    border: 6px solid;
  }
  .score-circle.pass {
    border-color: var(--correct);
    background: #edf7ef;
    color: var(--correct);
  }
  .score-circle.fail {
    border-color: var(--wrong);
    background: #fdf0ee;
    color: var(--wrong);
  }
  .score-number { font-size: 2.5rem; font-weight: 900; line-height: 1; }
  .score-label { font-size: 0.8rem; font-weight: 500; margin-top: 4px; }
  .results-title {
    font-family: 'Rubik', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .results-subtitle {
    font-size: 0.95rem;
    color: #777;
    margin-bottom: 28px;
    line-height: 1.6;
  }

  /* Category breakdown */
  .category-breakdown {
    text-align: right;
    margin: 24px 0;
    padding: 20px;
    background: var(--bg);
    border-radius: 14px;
  }
  .category-breakdown h3 {
    font-size: 0.95rem;
    margin-bottom: 14px;
    color: var(--olive-dark);
  }
  .cat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    font-size: 0.9rem;
    border-bottom: 1px solid var(--cream-dark);
  }
  .cat-row:last-child { border-bottom: none; }
  .cat-score { font-weight: 700; }
  .cat-score.good { color: var(--correct); }
  .cat-score.bad { color: var(--wrong); }

  /* Start screen */
  .start-card {
    background: white;
    border-radius: 20px;
    padding: 36px 28px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    text-align: center;
  }
  .start-card h2 {
    font-family: 'Rubik', sans-serif;
    font-size: 1.3rem;
    margin-bottom: 16px;
  }
  .start-info {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin: 20px 0 28px;
    flex-wrap: wrap;
  }
  .info-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .info-num {
    font-family: 'Rubik', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--olive);
  }
  .info-label { font-size: 0.8rem; color: #888; }

  .topics-list {
    text-align: right;
    margin: 0 auto 24px;
    max-width: 320px;
  }
  .topic-tag {
    display: inline-block;
    background: var(--cream);
    color: var(--olive-dark);
    font-size: 0.8rem;
    padding: 5px 14px;
    border-radius: 20px;
    margin: 3px;
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

  // === דגים נאים ===

  // === שינויים במנות ===

// Shuffle helper
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const letters = ['א', 'ב', 'ג', 'ד'];

let state = {
  screen: 'start', // start | quiz | results
  questions: [],
  current: 0,
  answers: [], // { selected, correct }
  answered: false,
};

function init() {
  state.questions = shuffle(QUESTIONS);
  state.current = 0;
  state.answers = [];
  state.answered = false;
  state.screen = 'start';
  render();
}

function startQuiz() {
  state.screen = 'quiz';
  render();
}

function selectAnswer(idx) {
  if (state.answered) return;
  state.answered = true;
  const q = state.questions[state.current];
  state.answers.push({ selected: idx, correct: q.correct });
  render();
}

function nextQuestion() {
  if (state.current < state.questions.length - 1) {
    state.current++;
    state.answered = false;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    state.screen = 'results';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function restart() {
  init();
  startQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  const app = document.getElementById('app');
  if (state.screen === 'start') {
    renderStart(app);
  } else if (state.screen === 'quiz') {
    renderQuiz(app);
  } else {
    renderResults(app);
  }
}

function renderStart(app) {
  const categories = [...new Set(QUESTIONS.map(q => q.category))];
  app.innerHTML = `
    <div class="header">
      <h1>מבחן תפריט פסאו</h1>
      <div class="subtitle">למלצרים וברמנים חדשים</div>
    </div>
    <div class="start-card">
      <h2>מוכנים לבדוק את הידע? 🍽️</h2>
      <div class="start-info">
        <div class="info-item">
          <div class="info-num">${QUESTIONS.length}</div>
          <div class="info-label">שאלות</div>
        </div>
        <div class="info-item">
          <div class="info-num">80%</div>
          <div class="info-label">ציון עובר</div>
        </div>
        <div class="info-item">
          <div class="info-num">${categories.length}</div>
          <div class="info-label">נושאים</div>
        </div>
      </div>
      <div class="topics-list">
        ${categories.map(c => `<span class="topic-tag">${c}</span>`).join('')}
      </div>
      <button class="nav-btn primary" onclick="startQuiz()">התחל מבחן ←</button>
    </div>
  `;
}

function renderQuiz(app) {
  const q = state.questions[state.current];
  const total = state.questions.length;
  const progress = ((state.current + (state.answered ? 1 : 0)) / total) * 100;

  let optionsHtml = q.options.map((opt, i) => {
    let cls = 'option-btn';
    if (state.answered) {
      cls += ' disabled';
      if (i === state.answers[state.current]?.selected && i === q.correct) {
        cls += ' selected-correct';
      } else if (i === state.answers[state.current]?.selected && i !== q.correct) {
        cls += ' selected-wrong';
      } else if (i === q.correct) {
        cls += ' show-correct';
      }
    }
    return `<button class="${cls}" onclick="selectAnswer(${i})">
      <span class="option-letter">${letters[i]}</span>
      <span>${opt}</span>
    </button>`;
  }).join('');

  let explanationHtml = '';
  if (state.answered) {
    const isCorrect = state.answers[state.current].selected === q.correct;
    explanationHtml = `
      <div class="explanation">
        <strong>${isCorrect ? '✅ נכון!' : '❌ לא נכון.'}</strong><br>
        ${q.explanation}
      </div>
    `;
  }

  let navHtml = '';
  if (state.answered) {
    const isLast = state.current === total - 1;
    navHtml = `
      <div class="nav-row">
        <button class="nav-btn primary" onclick="nextQuestion()">
          ${isLast ? 'לתוצאות' : 'שאלה הבאה'} ←
        </button>
        <span style="font-size:0.85rem;color:#999;">${state.current + 1} / ${total}</span>
      </div>
    `;
  }

  app.innerHTML = `
    <div class="header">
      <h1>מבחן תפריט פסאו</h1>
      <div class="subtitle">למלצרים וברמנים חדשים</div>
    </div>
    <div class="progress-container">
      <div class="progress-text">${state.current + 1} / ${total}</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" style="width:${progress}%"></div>
      </div>
    </div>
    <div class="question-card">
      <span class="question-category">${q.category}</span>
      <div class="question-text">${q.question}</div>
      <div class="options">${optionsHtml}</div>
      ${explanationHtml}
      ${navHtml}
    </div>
  `;
}

function renderResults(app) {
  const total = state.questions.length;
  const correct = state.answers.filter(a => a.selected === a.correct).length;
  const pct = Math.round((correct / total) * 100);
  const passed = pct >= 80;

  // Category breakdown
  const catMap = {};
  state.questions.forEach((q, i) => {
    if (!catMap[q.category]) catMap[q.category] = { total: 0, correct: 0 };
    catMap[q.category].total++;
    if (state.answers[i] && state.answers[i].selected === q.correct) {
      catMap[q.category].correct++;
    }
  });

  let catHtml = Object.entries(catMap).map(([cat, data]) => {
    const catPct = Math.round((data.correct / data.total) * 100);
    return `<div class="cat-row">
      <span>${cat}</span>
      <span class="cat-score ${catPct >= 75 ? 'good' : 'bad'}">${data.correct}/${data.total} (${catPct}%)</span>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="header">
      <h1>מבחן תפריט פסאו</h1>
      <div class="subtitle">תוצאות</div>
    </div>
    <div class="results-card">
      <div class="score-circle ${passed ? 'pass' : 'fail'}">
        <div class="score-number">${pct}%</div>
        <div class="score-label">${correct} מתוך ${total}</div>
      </div>
      <div class="results-title">${passed ? 'עברת בהצלחה! 🎉' : 'צריך עוד תרגול 📚'}</div>
      <div class="results-subtitle">
        ${passed
          ? 'מוכן/ה להתחיל התלמדות. יש לחזור על הנושאים שטעית בהם.'
          : 'ציון עובר הוא 80%. יש לחזור על החומר ולנסות שוב.'}
      </div>
      <div class="category-breakdown">
        <h3>פירוט לפי נושאים:</h3>
        ${catHtml}
      </div>
      <button class="nav-btn primary" onclick="restart()">נסה שוב ←</button>
    </div>
  `;
}

init();
